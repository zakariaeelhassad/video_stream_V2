server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:
        - id: video-service
          uri: http://video-service:8081
          predicates:
            - Path=/api/videos/**
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - "Content-Type"
              - "Authorization"
            allowCredentials: false
            maxAge: 3600

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
